<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrochureAI — Instant Company Brochures</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='7' height='7' x='1' y='1' rx='1' fill='%232563ff'/><rect width='7' height='7' x='9' y='1' rx='1' fill='%232563ff'/><rect width='7' height='7' x='1' y='9' rx='1' fill='%232563ff'/><rect width='7' height='7' x='9' y='9' rx='1' fill='%232563ff'/></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #0f0f0f;
      --paper:     #f7f4ef;
      --white:     #ffffff;
      --accent:    #2563ff;
      --accent-lt: #dde8ff;
      --muted:     #6b6b6b;
      --border:    #e0dcd5;
      --success:   #16a34a;
      --error:     #dc2626;
      --card-bg:   #ffffff;
      --serif:     'DM Serif Display', Georgia, serif;
      --sans:      'Inter', system-ui, sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --radius:    10px;
      --shadow:    0 2px 16px rgba(0,0,0,0.07);
    }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      background: var(--ink);
      color: var(--white);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 16px; height: 16px; fill: #fff; }
    .logo-text { font-family: var(--serif); font-size: 1.1rem; letter-spacing: -0.01em; }
    .logo-text span { color: var(--accent); font-style: italic; }
    header nav { margin-left: auto; display: flex; gap: 1.5rem; }
    header nav a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color .2s; }
    header nav a:hover { color: #fff; }

    .hero {
      text-align: center;
      padding: 5rem 2rem 3.5rem;
      max-width: 680px;
      margin: 0 auto;
    }
    .hero-eyebrow {
      display: inline-block;
      background: var(--accent-lt);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 99px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .hero-sub {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto 2.5rem;
    }

    .input-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      max-width: 640px;
      margin: 0 auto 3rem;
      box-shadow: var(--shadow);
    }
    .input-row {
      display: flex;
      gap: 0.75rem;
    }
    .url-input {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.72rem 1rem;
      outline: none;
      background: var(--paper);
      color: var(--ink);
      transition: border-color .2s;
    }
    .url-input:focus { border-color: var(--accent); background: #fff; }
    .url-input::placeholder { color: #aaa; }
    .btn-generate {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.72rem 1.4rem;
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, transform .1s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-generate:hover { background: #1a53e8; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { background: #93aff7; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--accent-lt);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-error { color: var(--error); }
    .status-ok { color: var(--success); }

    #output { display: none; max-width: 900px; margin: 0 auto 5rem; padding: 0 1.5rem; }

    .brochure-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--ink);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .brochure-company {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: -0.02em;
    }
    .brochure-meta {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .brochure-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    .brochure-grid .card-span2 { grid-column: 1 / -1; }

    .b-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }
    .b-card-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .b-card-label::before {
      content: '';
      width: 16px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }
    .b-card p, .b-card ul { font-size: 0.88rem; color: #333; line-height: 1.7; }
    .b-card ul { padding-left: 1.2rem; }
    .b-card ul li { margin-bottom: 0.3rem; }
    .b-card-empty { color: var(--muted); font-size: 0.82rem; font-style: italic; }

    .contact-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
    .chip {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.25rem 0.75rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink);
    }

    .brochure-actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }
    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .btn-secondary:hover { border-color: var(--ink); background: var(--paper); }
    .btn-primary {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover { background: #2a2a2a; }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .brochure-grid { grid-template-columns: 1fr; }
      .brochure-grid .card-span2 { grid-column: unset; }
      .input-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>
  </div>
  <span class="logo-text">Brochure<span>AI</span></span>
</header>

<section class="hero">
  <span class="hero-eyebrow">AI-Powered · Instant</span>
  <h1>Turn any website into a<br/><em>company brochure</em></h1>
  <p class="hero-sub">Paste a URL. We crawl the site, extract the right pages, and generate a structured brochure — ready in seconds.</p>
</section>

<div class="input-card">
  <div class="input-row">
    <input
      id="urlInput"
      class="url-input"
      type="url"
      placeholder="https://company.com"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="btn-generate" id="generateBtn" onclick="handleGenerate()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
      Generate
    </button>
  </div>
  <div id="status"></div>
</div>

<section id="output">
  <div class="brochure-header">
    <div class="brochure-company" id="outCompany"></div>
    <div class="brochure-meta" id="outMeta"></div>
  </div>

  <div class="brochure-grid">
    <div class="b-card card-span2" id="cardOverview">
      <div class="b-card-label">Company Overview</div>
      <div id="outOverview"></div>
    </div>

    <div class="b-card" id="cardServices">
      <div class="b-card-label">Services</div>
      <div id="outServices"></div>
    </div>

    <div class="b-card" id="cardProducts">
      <div class="b-card-label">Products</div>
      <div id="outProducts"></div>
    </div>

    <div class="b-card" id="cardIndustry">
      <div class="b-card-label">Industry & Sectors</div>
      <div id="outIndustry"></div>
    </div>

    <div class="b-card" id="cardContact">
      <div class="b-card-label">Contact</div>
      <div id="outContact"></div>
    </div>
  </div>

  <div class="brochure-actions">
  <button class="btn-secondary" onclick="copyJSON()">
      Copy JSON
  </button>

  <button class="btn-secondary" onclick="downloadJSON()">
      Download JSON
  </button>

  <button class="btn-primary" onclick="downloadPDF()">
      Download PDF
  </button>
</div>
</section>

<footer></footer>

<script>
 
  const API_BASE = "/api";  // Proxied via Vercel → Railway (fixes ERR_NAME_NOT_RESOLVED)

  let lastBrochure = null;
  let pdfBlob = null;

  function setStatus(msg, type = "") {
    const el = document.getElementById("status");
    if (type === "loading") {
      el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
    } else if (type === "error") {
      el.innerHTML = `<span class="status-error">✕ ${msg}</span>`;
    } else if (type === "ok") {
      el.innerHTML = `<span class="status-ok">✓ ${msg}</span>`;
    } else {
      el.innerHTML = msg;
    }
  }

  function fillSection(elId, text) {
    const el = document.getElementById(elId);
    if (!text || text.trim() === "") {
      el.innerHTML = `<p class="b-card-empty">No data found for this section.</p>`;
      return;
    }
    const lines = text.split("\n").filter(l => l.trim());
    if (lines.some(l => l.trim().startsWith("- ") || l.trim().startsWith("• "))) {
      const items = lines
        .filter(l => l.trim().startsWith("- ") || l.trim().startsWith("• "))
        .map(l => `<li>${l.replace(/^[-•]\s*/, "")}</li>`)
        .join("");
      el.innerHTML = `<ul>${items}</ul>`;
    } else {
      el.innerHTML = `<p>${text.replace(/\n\n/g, "</p><p>").replace(/\n/g, "<br/>")}</p>`;
    }
  }

  function renderBrochure(data) {
    lastBrochure = data;

    if (data.pdf_data) {

    const bytes = atob(data.pdf_data);

    const array = new Uint8Array(
        [...bytes].map(c => c.charCodeAt(0))
    );

    pdfBlob = new Blob(
        [array],
        { type: "application/pdf" });}

    document.getElementById("outCompany").textContent = data.company_name || "Unknown Company";
    document.getElementById("outMeta").textContent = `Generated ${new Date().toLocaleString()}`;

    fillSection("outOverview",  data.overview);
    fillSection("outServices",  data.services);
    fillSection("outProducts",  data.products);
    fillSection("outIndustry",  data.industry);

    const c = data.contact || {};
    const emails = (c.emails || []).map(e => `<span class="chip">✉ ${e}</span>`).join("");
    const phones = (c.phones || []).map(p => `<span class="chip">📞 ${p}</span>`).join("");
    const contactEl = document.getElementById("outContact");
    if (emails || phones) {
      contactEl.innerHTML = `<div class="contact-chips">${emails}${phones}</div>`;
    } else {
      contactEl.innerHTML = `<p class="b-card-empty">No contact info found.</p>`;
    }

    const output = document.getElementById("output");
    output.style.display = "block";
    output.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  async function handleGenerate() {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) {
      setStatus("Please enter a website URL.", "error");
      return;
    }
    if (!url.startsWith("http://") && !url.startsWith("https://")) {
      setStatus("URL must start with http:// or https://", "error");
      return;
    }

    const btn = document.getElementById("generateBtn");
    btn.disabled = true;
    document.getElementById("output").style.display = "none";
    setStatus("Crawling website and discovering links…", "loading");

    try {
      const resp = await fetch(`${API_BASE}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `Server error ${resp.status}`);
      }

      const data = await resp.json();
      setStatus("Brochure generated successfully.", "ok");
      renderBrochure(data);
    } catch (e) {
      setStatus(e.message || "Something went wrong.", "error");
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") handleGenerate();
  });

  function downloadJSON() {
    if (!lastBrochure) return;
    const blob = new Blob([JSON.stringify(lastBrochure, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${(lastBrochure.company_name || "brochure").replace(/\s+/g, "_")}.json`;
    a.click();
  }

  function downloadPDF() {

    if (!pdfBlob) {

        setStatus(
            "PDF not available.",
            "error"
        );

        return;
    }

    const url =
        URL.createObjectURL(pdfBlob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download =
      `${(lastBrochure.company_name || "brochure")
      .replace(/\s+/g, "_")}.pdf`;

    a.click();

    URL.revokeObjectURL(url);
}

  function copyJSON() {
    if (!lastBrochure) return;
    navigator.clipboard.writeText(JSON.stringify(lastBrochure, null, 2))
      .then(() => setStatus("JSON copied to clipboard.", "ok"))
      .catch(() => setStatus("Copy failed — try manually.", "error"));
  }

  window.addEventListener(
    "beforeunload",
    () => {
        pdfBlob = null;
    }
);
</script>
</body>
</html>
